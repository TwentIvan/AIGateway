# LiteLLM — configurazione Fase 1 per Casello
#
# REGOLA CHIAVE: ogni model_name qui sotto deve corrispondere ESATTAMENTE
# al campo `model` usato dagli agenti (tabella `agents` in Casello). In
# modalità proxy il gateway passa quel valore così com'è.
#
# litellm_params.model è invece l'ID reale verso il provider: è QUI che
# pinni o aggiorni la versione del modello senza toccare app o DB.

model_list:
  - model_name: "openai/gpt-5"
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

  - model_name: "openai/gpt-4o"
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: "openai/gpt-4o-mini"
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: "anthropic/claude-opus-4-8"
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: "anthropic/claude-3-5-sonnet"
    litellm_params:
      # verifica l'ID attualmente attivo su docs.claude.com prima del deploy;
      # se deprecato, punta qui il successore senza cambiare il model_name
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  # scarta i parametri non supportati dal provider di destinazione
  # (es. cache_control verso OpenAI): essenziale per la patch caching
  drop_params: true
  num_retries: 2
  request_timeout: 120

# Fallback tra modelli: da attivare DOPO la settimana di misura,
# così la baseline resta pulita. Esempio:
# router_settings:
#   fallbacks:
#     - "anthropic/claude-opus-4-8": ["openai/gpt-5"]
#     - "openai/gpt-4o": ["anthropic/claude-3-5-sonnet"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Postgres del Repl gateway: abilita virtual key e spend log
  database_url: os.environ/DATABASE_URL
